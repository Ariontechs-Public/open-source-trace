last_traced: 2026-05-19
learned:
  - "7 tools is the asserted minimum for an agentic coding CLI: Bash, Read, Write, Edit, Glob, Grep, Agent. Everything Claude Code ships beyond this is convenience or specialization, not load-bearing."
  - "Each milestone (v0 chatbot → v8 CLI args) is a separate git tag with a documented 'key concept' — `git checkout v3` lets you study tool risk classification in isolation."
  - "Permission model is ~80 lines (v3): Bash classified per command; Read/Glob/Grep/Agent are 'safe'; Write/Edit are 'write'. That's the minimum viable shape."
  - "Smart conversation compaction (v5) is treated as its own discrete milestone in ~130 LOC — not bundled into the chat loop."
  - "Sub-agent (v7) is just the 7th tool, not a separate dispatch system — orchestration primitive in ~150 LOC."
  - "Readline UI vs Claude Code's React+Ink: ergonomically worse but cuts dependencies dramatically. Trade visible."
  - "System prompt is a plain concatenation, not a template: CORE_PROMPT + env + git + multi-level CLAUDE.md + persistent memories. Five sources, ordered, no Jinja."
  - "Sub-agent security boundary is a literal whitelist (Read/Glob/Grep only) — permissions-as-architecture, not a runtime policy engine."
  - "Sessions are persisted as the raw API message array on disk — no schema, no parsing on resume."
  - "Two-pass markdown rendering: stream raw text into terminal, then ANSI-erase and re-render with markdown formatting. Avoids a streaming-markdown parser entirely. Graph cohesion 1.0."
  - "Permission philosophy: confirmation, not prevention — don't block dangerous actions, make them an explicit user choice. classifyBashRisk() regex-matches DESTRUCTIVE_PATTERNS / WRITE_PATTERNS; everything else is 'safe'."
  - "Compaction trigger: 75% of 200K context = ~150K tokens. Algorithm: keep last 2 messages, summarize the rest into an acknowledged summary message."
