  - "Two-agent toggle: `build` (full-access) vs `plan` (read-only, denies edits, asks before bash). Tab-switchable — the safety/exploration tradeoff is a user-visible affordance, not a settings dialog."
  - "Internal `general` subagent for complex searches, invokable via @general."
  - "Distribution surface is massive (brew tap + scoop + choco + AUR + nix + mise + curl + npm + desktop installers) — lowers 'I can't try it' friction more than docs ever could."
  - "22+ READMEs in maintained translations — community translation surface is treated as a feature."
  - "Default branch is `dev`, not `main` — release discipline distinguishes integration target from publishable releases."
